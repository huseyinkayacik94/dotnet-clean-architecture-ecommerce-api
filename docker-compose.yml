version: '3.9'

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Pass123
    ports:
      - "1433:1433"
    networks:
      - ecommerce-network

  api:
    build:
      context: .
      dockerfile: ECommerce.API/Dockerfile
    container_name: ecommerce-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=ecommerce-sql,1433;Database=ECommerceDb;User Id=sa;Password=YourStrong!Pass123;TrustServerCertificate=True;Encrypt=False;
    ports:
      - "5000:8080"
    depends_on:
      - sql
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge